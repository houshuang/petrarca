<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#f7f4ec" />
    <meta name="description" content="Petrarca — intelligent read-later app for deep reading" />
    <title>Petrarca</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23f7f4ec'/%3E%3Ctext x='16' y='25' font-family='Georgia,serif' font-weight='700' font-size='24' fill='%238b2500' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
    <style id="petrarca-web-styles">
      body, html {
        background-color: #f7f4ec !important;
        margin: 0;
        padding: 0;
      }

      #root > div:first-child {
        width: 100% !important;
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: #d0ccc0;
        border-radius: 6px;
      }
      ::-webkit-scrollbar-thumb:hover { background: #b0a898; }

      ::selection { background: rgba(139, 37, 0, 0.15); color: #2a2420; }

      [role="button"] {
        cursor: pointer;
        transition: background-color 0.15s ease, transform 0.15s ease, opacity 0.15s ease;
      }
      [role="tab"] {
        transition: background-color 0.15s ease;
      }
      [role="tab"]:hover {
        background-color: rgba(139, 37, 0, 0.03);
      }

      *:focus-visible {
        outline: 2px solid #8b2500;
        outline-offset: 2px;
      }

      a { color: #2a4a6a; text-decoration: none; }
      a:hover { color: #8b2500; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
